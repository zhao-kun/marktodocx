name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: npm ci

      - name: Run all-host smoke checks
        run: npm run smoke:all

  parity:
    runs-on: ubuntu-latest
    needs: build-and-smoke
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: npm ci

      - name: Install Puppeteer-managed Chrome
        env:
          PUPPETEER_SKIP_DOWNLOAD: '0'
        run: npx puppeteer browsers install chrome

      - name: Run full parity gate
        run: npm run test:parity:all